<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caesar Cipher Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080c10;
  --surface:   #0d1117;
  --glass:     rgba(255,255,255,0.03);
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(0,210,255,0.4);
  --cyan:      #00d2ff;
  --cyan-dim:  rgba(0,210,255,0.15);
  --cyan-glow: rgba(0,210,255,0.5);
  --violet:    #7c3aed;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --text:      #e2e8f0;
  --muted:     #475569;
  --muted2:    #1e293b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 60px;
  position: relative;
  overflow-x: hidden;
}

/* ── Animated mesh background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,210,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(124,58,237,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 10%, rgba(0,210,255,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Grid lines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,210,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; width: 100%; max-width: 820px; }

/* ── TOP NAV BAR ── */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.75rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan-glow), 0 0 20px var(--cyan-glow);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 6px var(--cyan-glow), 0 0 14px var(--cyan-glow); }
  50%      { box-shadow: 0 0 12px var(--cyan-glow), 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,210,255,0.2); }
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 0.7rem;
  color: var(--muted);
}

#clock {
  font-size: 0.85rem;
  color: var(--cyan);
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,210,255,0.06);
  border: 1px solid rgba(0,210,255,0.15);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--cyan);
}

.status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cyan);
  animation: blink-soft 1.4s ease-in-out infinite;
}

@keyframes blink-soft {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

/* ── TITLE ── */
.hero {
  text-align: center;
  margin-bottom: 36px;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2rem, 5vw, 3.2rem);
  letter-spacing: -1px;
  color: #fff;
  line-height: 1;
  margin-bottom: 8px;
}

h1 span {
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow), 0 0 60px rgba(0,210,255,0.2);
}

.tagline {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* ── CARD ── */
.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,210,255,0.4), transparent);
}

/* ── LANG TABS ── */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}

.tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  padding: 10px;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 1px;
  transition: all 0.25s;
  position: relative;
}

.tab.active {
  background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(124,58,237,0.1));
  color: var(--cyan);
  border: 1px solid rgba(0,210,255,0.25);
  box-shadow: 0 2px 12px rgba(0,210,255,0.1), inset 0 1px 0 rgba(0,210,255,0.15);
}

.tab:hover:not(.active) {
  background: rgba(255,255,255,0.04);
  color: var(--text);
}

/* ── LABEL ── */
.field-label {
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-label::before {
  content: '';
  display: inline-block;
  width: 3px; height: 10px;
  background: var(--cyan);
  border-radius: 2px;
}

/* ── TEXTAREA ── */
.textarea-wrap { position: relative; margin-bottom: 24px; }

textarea {
  width: 100%;
  height: 120px;
  background: rgba(0,0,0,0.4);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  line-height: 1.6;
  resize: none;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  caret-color: var(--cyan);
}

textarea::placeholder { color: var(--muted2); }

textarea:focus {
  border-color: rgba(0,210,255,0.35);
  box-shadow: 0 0 0 3px rgba(0,210,255,0.06), 0 0 20px rgba(0,210,255,0.04);
}

.char-count {
  position: absolute;
  bottom: 10px;
  left: 14px;
  font-size: 0.6rem;
  color: var(--muted2);
  letter-spacing: 1px;
  pointer-events: none;
}

/* ── SLIDER ROW ── */
.slider-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
}

.slider-left { flex: 1; }

.slider-key-display {
  font-family: 'Syne', sans-serif;
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow);
  line-height: 1;
  min-width: 60px;
  text-align: center;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--muted2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  margin-top: 12px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan-glow), 0 0 20px rgba(0,210,255,0.3);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.3);
  box-shadow: 0 0 16px var(--cyan-glow), 0 0 40px rgba(0,210,255,0.4);
}

.tick-row {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 0.6rem;
  color: var(--muted2);
}

/* ── ACTION BUTTONS ── */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(0,0,0,0.3);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-icon2 {
  font-size: 1.3rem;
  line-height: 1;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

/* Encrypt */
.btn-enc { --c: var(--cyan); --cg: var(--cyan-glow); }
.btn-enc:hover {
  border-color: rgba(0,210,255,0.4);
  color: var(--cyan);
  background: rgba(0,210,255,0.07);
  box-shadow: 0 0 20px rgba(0,210,255,0.1), inset 0 1px 0 rgba(0,210,255,0.15);
  transform: translateY(-2px);
}

/* Decrypt */
.btn-dec { --c: var(--amber); }
.btn-dec:hover {
  border-color: rgba(245,158,11,0.4);
  color: var(--amber);
  background: rgba(245,158,11,0.07);
  box-shadow: 0 0 20px rgba(245,158,11,0.1), inset 0 1px 0 rgba(245,158,11,0.15);
  transform: translateY(-2px);
}

/* Brute */
.btn-brute { --c: var(--red); }
.btn-brute:hover {
  border-color: rgba(239,68,68,0.4);
  color: var(--red);
  background: rgba(239,68,68,0.07);
  box-shadow: 0 0 20px rgba(239,68,68,0.1), inset 0 1px 0 rgba(239,68,68,0.15);
  transform: translateY(-2px);
}

/* ── RESULT PANEL ── */
.result-card {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.result-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

.result-tabs-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.res-dot-group { display: flex; gap: 6px; align-items: center; }

.rd {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.rd-live {
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan-glow);
  animation: blink-soft 1.4s ease-in-out infinite;
}

.rd-off1 { background: var(--muted2); }
.rd-off2 { background: var(--muted2); }

.result-label {
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}

.copy-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 2px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.copy-btn:hover {
  border-color: rgba(0,210,255,0.3);
  color: var(--cyan);
  background: rgba(0,210,255,0.05);
}

#result-body {
  padding: 20px 18px;
  min-height: 90px;
  font-size: 0.95rem;
  line-height: 1.8;
  word-break: break-all;
}

#result-body.empty-state {
  color: var(--muted2);
  font-size: 0.8rem;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#result-body.empty-state::before {
  content: '▋';
  animation: blink-soft 1s step-end infinite;
  color: var(--cyan);
}

/* Brute force grid */
.bf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 8px;
}

.bf-item {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 0.8rem;
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
}

.bf-item:hover {
  border-color: rgba(0,210,255,0.2);
  background: rgba(0,210,255,0.04);
}

.bf-k {
  font-size: 0.6rem;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* Slide-in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim-in { animation: fadeUp 0.3s ease both; }

/* ── FOOTER ── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  padding: 0 4px;
  font-size: 0.62rem;
  color: var(--muted2);
  letter-spacing: 2px;
}

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .actions { grid-template-columns: 1fr; }
  .slider-row { grid-template-columns: 1fr; }
  .slider-key-display { font-size: 2rem; }
}
</style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-dot"></div>
      CAESAR_CIPHER
    </div>
    <div class="nav-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        SECURE
      </div>
      <span id="clock">00:00:00</span>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>CIPHER <span>STUDIO</span></h1>
    <div class="tagline">Encrypt · Decrypt · Brute Force</div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button id="btnEn" class="tab active" onclick="setLang('en')">EN &nbsp;/&nbsp; A–Z</button>
      <button id="btnHe" class="tab" onclick="setLang('he')">HE &nbsp;/&nbsp; א–ת</button>
    </div>

    <!-- Input -->
    <div class="field-label">Input</div>
    <div class="textarea-wrap">
      <textarea id="inputMsg" placeholder="...Paste message for encryption/decryption" oninput="updateCharCount()"></textarea>
      <span class="char-count" id="charCount">0 chars</span>
    </div>

    <!-- Slider -->
    <div class="field-label">Shift Key</div>
    <div class="slider-row">
      <div class="slider-left">
        <input type="range" id="shiftRange" min="1" max="25" value="3" oninput="updateShift()">
        <div class="tick-row">
          <span>01</span><span>06</span><span>12</span><span>18</span><span>25</span>
        </div>
      </div>
      <div class="slider-key-display" id="shiftNum">03</div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-enc" onclick="execute(1)">
        <span class="btn-icon2">⬆</span>ENCRYPT
      </button>
      <button class="btn btn-dec" onclick="execute(-1)">
        <span class="btn-icon2">⬇</span>DECRYPT
      </button>
      <button class="btn btn-brute" onclick="runBruteForce()">
        <span class="btn-icon2">⚡</span>BRUTE FORCE
      </button>
    </div>

    <!-- Result -->
    <div class="result-card">
      <div class="result-topbar">
        <div class="result-tabs-left">
          <div class="res-dot-group">
            <div class="rd rd-live"></div>
            <div class="rd rd-off1"></div>
            <div class="rd rd-off2"></div>
          </div>
          <span class="result-label">Output Stream</span>
        </div>
        <button class="copy-btn" onclick="copyResult()">Copy</button>
      </div>
      <div id="result-body" class="empty-state">...Awaiting input</div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>CAESAR_CIPHER_STUDIO v3.0</span>
    <span id="session-id">SID: --</span>
  </div>

</div>

<script>
  // Clock
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0,8);
  }
  setInterval(tick, 1000); tick();

  // Session ID
  document.getElementById('session-id').textContent =
    'SID: ' + Math.random().toString(36).slice(2,8).toUpperCase();

  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    document.getElementById('btnHe').classList.toggle('active', lang === 'he');
    const s = document.getElementById('shiftRange');
    s.max = lang === 'en' ? 25 : 26;
    if (+s.value > +s.max) s.value = s.max;
    updateShift();
  }

  function updateShift() {
    const v = document.getElementById('shiftRange').value;
    document.getElementById('shiftNum').textContent = String(v).padStart(2, '0');
    // Update slider gradient
    const s = document.getElementById('shiftRange');
    const pct = ((+s.value - +s.min) / (+s.max - +s.min)) * 100;
    s.style.background = `linear-gradient(to right, var(--cyan) ${pct}%, var(--muted2) ${pct}%)`;
  }

  function updateCharCount() {
    const len = document.getElementById('inputMsg').value.length;
    document.getElementById('charCount').textContent = len + ' chars';
  }

  function caesarLogic(text, shift) {
    return text.split('').map(ch => {
      const c = ch.charCodeAt(0);
      if (currentLang === 'en') {
        if (c >= 65 && c <= 90)  return String.fromCharCode(((c - 65 + shift) % 26 + 26) % 26 + 65);
        if (c >= 97 && c <= 122) return String.fromCharCode(((c - 97 + shift) % 26 + 26) % 26 + 97);
      } else {
        if (c >= 1488 && c <= 1514) return String.fromCharCode(((c - 1488 + shift) % 27 + 27) % 27 + 1488);
      }
      return ch;
    }).join('');
  }

  function setResult(html, isText = false) {
    const el = document.getElementById('result-body');
    el.className = 'anim-in';
    if (isText) {
      el.textContent = html;
    } else {
      el.innerHTML = html;
    }
  }

  function execute(dir) {
    const text = document.getElementById('inputMsg').value;
    if (!text.trim()) { setEmpty('// empty input'); return; }
    const shift = parseInt(document.getElementById('shiftRange').value) * dir;
    const out = caesarLogic(text, shift);
    const el = document.getElementById('result-body');
    el.style.color = dir === 1 ? 'var(--cyan)' : 'var(--amber)';
    el.style.direction = currentLang === 'he' ? 'rtl' : 'ltr';
    setResult(out, true);
  }

  function runBruteForce() {
    const text = document.getElementById('inputMsg').value;
    if (!text.trim()) { setEmpty('// empty input'); return; }
    const max = currentLang === 'en' ? 25 : 26;
    const el = document.getElementById('result-body');
    el.style.color = 'var(--text)';
    el.style.direction = 'ltr';
    let html = '<div class="bf-grid">';
    for (let i = 1; i <= max; i++) {
      const res = caesarLogic(text, -i);
      html += `<div class="bf-item"><div class="bf-k">KEY ${String(i).padStart(2,'0')}</div>${res}</div>`;
    }
    html += '</div>';
    setResult(html);
  }

  function setEmpty(msg) {
    const el = document.getElementById('result-body');
    el.className = 'empty-state';
    el.style.color = '';
    el.textContent = msg;
  }

  function copyResult() {
    const el = document.getElementById('result-body');
    const text = el.innerText || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = 'var(--cyan)';
      btn.style.borderColor = 'rgba(0,210,255,0.4)';
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1500);
    });
  }

  // Init
  updateShift();
</script>
</body>
</html>
